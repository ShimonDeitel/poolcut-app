name: Poolcut
options:
  bundleIdPrefix: com.shimondeitel.leaguedues
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Poolcut:
    type: application
    platform: iOS
    sources:
      - path: Poolcut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaguedues
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Poolcut/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PoolcutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoolcutTests
      - path: Poolcut.storekit
    dependencies:
      - target: Poolcut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaguedues.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PoolcutUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PoolcutUITests
    dependencies:
      - target: Poolcut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leaguedues.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Poolcut:
    build:
      targets:
        Poolcut: all
        PoolcutTests: [test]
        PoolcutUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Poolcut.storekit
    test:
      config: Debug
      storeKitConfiguration: Poolcut.storekit
      targets:
        - PoolcutTests
        - PoolcutUITests
    archive:
      config: Release
